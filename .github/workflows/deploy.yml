name: Deploy to GitHub Pages

on:
  # Build + deploy on every push to main
  push:
    branches: [main]
  # ...and allow manual runs from the Actions tab
  workflow_dispatch:

# Permissions the GITHUB_TOKEN needs to publish to Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deploy at a time; newer pushes cancel in-flight runs
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      # withastro/action installs deps, runs `astro build`, and uploads
      # ./dist as the Pages artifact. node-version matches .nvmrc.
      - name: Build with Astro
        uses: withastro/action@v3
        with:
          node-version: 20

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
